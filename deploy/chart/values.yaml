# ============================================================================
# stratos — chart values
#
# The chart deploys three workloads:
#   api    the Go binary (stratos-api): app port + management port
#   ui     the customer console SPA (static nginx image)
#   admin  the operator console SPA (static nginx image)
#
# Datastores: PostgreSQL (primary, required) and RabbitMQ (required).
# Both can be bundled (bitnami subcharts, on by default) or brought
# externally via the matching external* block. Keycloak is optional.
# ============================================================================

nameOverride: ""
fullnameOverride: ""

# Pull secrets applied to every stratos workload (not the subcharts —
# set those on postgresql/rabbitmq/keycloak directly if needed).
imagePullSecrets: []

# Global values propagated to the bundled bitnami subcharts. allowInsecureImages
# acknowledges the `bitnamilegacy` image repoint on rabbitmq (and postgresql if you
# repoint it): recent Bitnami charts hard-fail render on a substituted/non-Bitnami
# image unless this is set.
global:
  security:
    allowInsecureImages: true

# ----------------------------------------------------------------------------
# api — the stratos-api Go service
# ----------------------------------------------------------------------------
api:
  image:
    repository: ghcr.io/menlocloud/stratos
    # Empty tag falls back to the chart appVersion.
    tag: ""
    pullPolicy: IfNotPresent

  replicas: 1

  # App (public API) and management (probes + operator triggers) listeners.
  # These are the binary's built-in defaults. If you change them you must
  # also set server.port / management.server.port in `applicationYml` below,
  # because the binary only reads its listen ports from the config file.
  port: 8080
  managementPort: 8081

  # Data-at-rest encryption key (STRATOS_ENCRYPTION_DEFAULT_KEY). REQUIRED — no default:
  # set a strong random value (e.g. `openssl rand -hex 32`) or point api.existingSecret at a
  # pre-made Secret. A chart-managed install with this empty FAILS by design (a known key would
  # let anyone decrypt/forge stored secrets). For a throwaway local dev install use
  # `-f deploy/chart/values-dev.yaml`.
  encryptionKey: ""

  # Name of a pre-created Secret that replaces the chart-managed one.
  # It must carry the keys: db-url, rabbitmq-password, encryption-key.
  existingSecret: ""

  # Public base URLs the API embeds in mail links, redirects and MCP
  # metadata (STRATOS_SELF_*). The ui/admin URLs also seed the CORS
  # allow-list. Leave empty to skip.
  selfUrls:
    base: ""
    api: ""
    ui: ""
    admin: ""

  # Extra CORS origins beyond the ones derived from selfUrls.ui/admin
  # (STRATOS_CORS_ALLOWED_ORIGINS, joined with commas).
  corsAllowedOrigins: []

  # Scheduled-job gates. All OFF by default on purpose: a plain deploy
  # stays dormant and never charges bills on a timer.
  jobs:
    # Auto-start the charge/metrics crons (charges bills on a timer!).
    schedulerEnabled: false
    # Expose the on-demand POST :<managementPort>/debug/run-* triggers
    # without starting the crons.
    debugTriggers: false
    # Route the charge cron through RabbitMQ fan-out instead of the
    # in-process loop.
    rabbitFanout: false

  # Optional literal application.yml mounted at /opt/stratos/api/application.yml.
  # Env injected by this chart always wins over the file. Example:
  #   applicationYml: |
  #     logging:
  #       level:
  #         root: DEBUG
  applicationYml: ""

  # Mail gateway (STRATOS_MAIL_*) — the bootstrap/fallback SMTP gateway. Operators can ALSO
  # configure SMTP under Admin → Integrations → Mail, which is stored in the database and takes
  # precedence over this env gateway. Leave smtp.host empty to disable the env gateway (a NoopMailer
  # then drops email until a gateway is configured). from + smtp.host are both required to enable.
  mail:
    from: "" # STRATOS_MAIL_FROM, e.g. no-reply@example.com
    smtp:
      host: "" # STRATOS_MAIL_SMTP_HOST, e.g. smtp.sendgrid.net
      port: 587 # STRATOS_MAIL_SMTP_PORT
      username: "" # STRATOS_MAIL_SMTP_USERNAME (e.g. "apikey" for SendGrid)
      # Password comes from a pre-created Secret (never inline). Set existingSecret to that Secret's
      # name and passwordKey to the key holding the SMTP password / API key.
      existingSecret: ""
      passwordKey: STRATOS_MAIL_SMTP_PASSWORD

  # Raw extra env entries appended to the api container. Use this for the
  # OpenStack dev bootstrap (OS_*) or any other env, e.g.:
  #   extraEnv:
  #     - name: OS_AUTH_URL
  #       value: https://keystone.example.com:5000/v3
  extraEnv: []

  service:
    type: ClusterIP
    port: 8080

  ingress:
    enabled: false
    className: ""
    host: ""
    path: /
    annotations: {}
    tls: []

  resources: {}
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ----------------------------------------------------------------------------
# ui / admin — the two static SPA images
# ----------------------------------------------------------------------------
ui:
  image:
    repository: ghcr.io/menlocloud/stratos-web
    tag: ""
    pullPolicy: IfNotPresent
  replicas: 1
  port: 80
  # Browser-facing API URL baked into the SPA runtime config. Empty derives
  # <api.selfUrls.api>/api/v1 (or a relative /api/v1 when that is unset too).
  apiUrl: ""
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: false
    className: ""
    host: ""
    path: /
    annotations: {}
    tls: []
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

admin:
  image:
    repository: ghcr.io/menlocloud/stratos-admin
    tag: ""
    pullPolicy: IfNotPresent
  replicas: 1
  port: 80
  apiUrl: ""
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: false
    className: ""
    host: ""
    path: /
    annotations: {}
    tls: []
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ----------------------------------------------------------------------------
# auth — the three OIDC realms the API validates tokens against.
# The ui SPA logs in against `main`; the admin SPA against `admin`;
# `adminApi` guards the machine-to-machine /admin-api/v1 surface.
# Empty issuer = that realm is disabled (its tokens are rejected).
# With the bundled Keycloak, set the issuers to the PUBLIC Keycloak URL
# (tokens carry a host-derived `iss`, so an in-cluster URL usually won't
# match) — e.g. https://id.example.com/realms/<realm>.
# ----------------------------------------------------------------------------
auth:
  main:
    issuer: ""
    clientId: stratos-ui
  admin:
    issuer: ""
    clientId: stratos-admin
  adminApi:
    issuer: ""
    clientId: stratos-admin-api

# ----------------------------------------------------------------------------
# PostgreSQL — the primary datastore.
# Bundled bitnami subchart by default; auth.* below makes the subchart
# create the `stratos` role and database on first boot.
# ----------------------------------------------------------------------------
postgresql:
  enabled: true
  # ⚠ Bitnami catalog risk (unresolved for PostgreSQL): the subchart pulls PostgreSQL 18.4, but the
  # frozen `bitnamilegacy` mirror predates PG 18 (frozen ~Aug 2025) — so it has NO PG 18 image, and
  # repointing there would 404 or downgrade to a PG that can't start on PG-18 data. The subchart
  # image tag is also `latest` (a moving tag). SAFE STOPGAP: mirror the current `bitnami/postgresql`
  # into your own registry and pin `image.registry`/`image.repository`/`image.tag` to it. Real exit:
  # CloudNativePG (operator). Until then this keeps the subchart default (bitnami current `latest`).
  auth:
    username: stratos
    # REQUIRED — no default. Set a strong password or use externalPostgresql.existingSecret.
    # A bundled install with this empty FAILS by design (see values-dev.yaml for a dev value).
    password: ""
    database: stratos

# Bring-your-own PostgreSQL (used when postgresql.enabled=false).
externalPostgresql:
  host: ""
  port: 5432
  database: stratos
  username: stratos
  # Plain password: the chart builds the DSN into its own Secret.
  password: ""
  sslMode: require
  # Alternatively, a pre-created Secret whose `secretKey` holds the COMPLETE
  # DSN (postgres://user:pass@host:port/db?sslmode=...). When set, it is
  # consumed directly and host/port/database/username/password are ignored.
  existingSecret: ""
  secretKey: db-url

# ----------------------------------------------------------------------------
# CloudNativePG — run PostgreSQL via the CloudNativePG operator (official
# ghcr.io/cloudnative-pg/postgresql images, NO Bitnami) instead of the bundled
# bitnami subchart. Set postgresql.enabled=false when cnpg.enabled=true.
# Two modes:
#   • Operator ALREADY in the cluster → cnpg.enabled=true, installOperator=false.
#     The chart renders only the Cluster CR + its owner-credentials Secret.
#   • Operator NOT installed → also set installOperator=true to bundle the
#     cloudnative-pg operator subchart (operator + CRDs, cluster-wide).
#     ⚠ On a FRESH cluster the operator's admission webhook may not be ready when
#     the Cluster CR is first applied — if `helm install` errors on the Cluster,
#     re-run `helm upgrade` (idempotent), or install the operator first and use
#     the operator-present mode.
# db name / owner / password are taken from postgresql.auth.* (uniform DSN wiring).
# ----------------------------------------------------------------------------
cnpg:
  enabled: false
  installOperator: false
  clusterName: ""   # defaults to <fullname>-pg; the app connects to <name>-rw:5432
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18
  storage:
    size: 10Gi
    storageClass: ""   # "" = cluster default StorageClass
  # A pre-created kubernetes.io/basic-auth Secret (username+password for the owner).
  # When empty the chart renders one from postgresql.auth.username/password.
  existingSecret: ""

# ----------------------------------------------------------------------------
# RabbitMQ — the message broker (charge fan-out).
# ----------------------------------------------------------------------------
rabbitmq:
  enabled: true
  # STOPGAP (see postgresql above): pin to the frozen bitnamilegacy mirror so pulls survive the
  # docker.io/bitnami catalog deletion. Planned exit: the official RabbitMQ Cluster Operator.
  image:
    registry: docker.io
    repository: bitnamilegacy/rabbitmq
  auth:
    username: stratos
    # REQUIRED — no default. Set a strong password or use externalRabbitmq.existingSecret.
    # A bundled install with this empty FAILS by design (see values-dev.yaml for a dev value).
    password: ""

# Bring-your-own RabbitMQ (used when rabbitmq.enabled=false).
externalRabbitmq:
  host: ""
  port: 5672
  username: ""
  # Plain password: rendered into the chart-managed Secret.
  password: ""
  # Alternatively, a pre-created Secret whose `secretKey` holds the password.
  existingSecret: ""
  secretKey: rabbitmq-password

# ----------------------------------------------------------------------------
# Keycloak — optional bundled OIDC issuer via codecentric/keycloakx, which runs the OFFICIAL
# quay.io/keycloak/keycloak image (subchart default; NOT Bitnami). OFF by default — most installs
# point auth.*.issuer at an external IdP instead. Expose it via keycloakx.ingress.*. Full options:
# https://github.com/codecentric/helm-charts/tree/master/charts/keycloakx
# ----------------------------------------------------------------------------
keycloakx:
  enabled: false
  # Bootstrap admin — REQUIRED when enabled (no default). Prefer a Secret (valueFrom.secretKeyRef)
  # in any real install.
  extraEnv: |
    - name: KC_BOOTSTRAP_ADMIN_USERNAME
      value: admin
    - name: KC_BOOTSTRAP_ADMIN_PASSWORD
      value: ""
  # kc.sh production start (TLS terminated at the ingress/gateway → http + proxy headers). To
  # auto-import the realm below, append "--import-realm" here AND mount the ConfigMap via
  # extraVolumes/extraVolumeMounts (see realmImport).
  command:
    - "/opt/keycloak/bin/kc.sh"
    - "start"
    - "--http-enabled=true"
    - "--http-port=8080"
    - "--hostname-strict=false"
    - "--proxy-headers=xforwarded"
  # Keycloak's OWN database — point at the bundled postgresql (create a `keycloak` db + role; do NOT
  # reuse the stratos database) or a managed PG. dbchecker waits for it before boot.
  dbchecker:
    enabled: true
  database:
    vendor: postgres
    hostname: ""
    port: 5432
    database: keycloak
    username: keycloak
    password: ""

# Optional Keycloak realm export. When non-empty it is rendered verbatim
# into a ConfigMap (<fullname>-realm-import, key realm.json). The chart
# ships NO baked realm: supply your own export defining the realm(s) and
# the stratos-ui / stratos-admin / stratos-admin-api clients you configure
# under `auth` above.
realmImport:
  json: ""

# ----------------------------------------------------------------------------
# Gateway API — HTTPRoutes as an alternative to Ingress (OFF by default).
# One HTTPRoute is rendered per component with a non-empty hostname.
# ----------------------------------------------------------------------------
gateway:
  enabled: false
  # e.g. [{name: shared-gateway, namespace: infra}]
  parentRefs: []
  hostnames:
    api: ""
    ui: ""
    admin: ""
