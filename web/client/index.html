<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/brand/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#FFFDF6" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0c0b09" />
    <title>Stratos Console</title>
    <script src="/config.js"></script>
    <script>
      // Pre-paint theme init: stratos.theme = "light" | "dark" | absent(system).
      // Must run synchronously before the app bundle so there is no flash.
      (function () {
        try {
          var t = localStorage.getItem("stratos.theme");
          var dark =
            t === "dark" ||
            (t !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
