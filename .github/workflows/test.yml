name: test

# Go unit tests (always) + the build-tagged integration tests (testcontainers spins
# up a throwaway PostgreSQL; ubuntu-latest runners ship Docker). Runs on push to main
# and on PRs so a regression gates before the image/chart release tags are cut.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
      - name: Unit tests
        run: go test ./...
      - name: Integration tests (testcontainers PostgreSQL)
        run: go test -tags=integration ./test/integration/...
